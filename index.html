<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ocean Bingo Xtravaganza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #FBF0DC;
    --sand-deep: #F2DFBE;
    --ocean: #0E5B8C;
    --ocean-deep: #0A3D5E;
    --foam: #2FB5A8;
    --coral: #FF6B5E;
    --white: #FFFDF8;
    --ink: #14344A;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--sand);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    min-height: 100%;
  }

  body {
    padding: env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    /* subtle sand grain */
    background-image: radial-gradient(rgba(20, 52, 74, 0.035) 1px, transparent 1px);
    background-size: 14px 14px;
  }

  /* ---------- Title card: cabana awning ---------- */
  .awning {
    width: 100%;
    max-width: 460px;
    margin-top: 18px;
    background: repeating-linear-gradient(
      90deg,
      var(--ocean) 0 34px,
      var(--white) 34px 68px
    );
    border-radius: 14px 14px 0 0;
    padding: 18px 12px 14px;
    position: relative;
    box-shadow: 0 4px 0 var(--ocean-deep);
  }

  /* scalloped awning edge */
  .awning::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: -16px;
    height: 16px;
    background:
      radial-gradient(circle at 17px 0, var(--ocean) 16px, transparent 17px) 0 0 / 68px 16px repeat-x,
      radial-gradient(circle at 17px 0, var(--white) 16px, transparent 17px) 34px 0 / 68px 16px repeat-x;
  }

  .awning h1 {
    margin: 0;
    text-align: center;
    font-family: 'Lilita One', cursive;
    font-weight: 400;
    font-size: clamp(1.6rem, 7.5vw, 2.4rem);
    line-height: 1.05;
    color: var(--white);
    text-shadow:
      2px 2px 0 var(--ocean-deep),
      -1px -1px 0 var(--ocean-deep),
      1px -1px 0 var(--ocean-deep),
      -1px 1px 0 var(--ocean-deep),
      3px 3px 0 rgba(10, 61, 94, 0.45);
    letter-spacing: 0.02em;
  }

  .awning .sub {
    margin: 4px 0 0;
    text-align: center;
    font-weight: 800;
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--sand);
    text-shadow: 1px 1px 0 var(--ocean-deep);
  }

  /* ---------- Buttons ---------- */
  .controls {
    display: flex;
    gap: 10px;
    margin: 34px 0 18px;
    width: 100%;
    max-width: 460px;
  }

  button.action {
    flex: 1;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    padding: 14px 10px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    color: var(--white);
    background: var(--foam);
    box-shadow: 0 4px 0 #1E877D;
    transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.2s;
  }

  button.action.coral {
    background: var(--coral);
    box-shadow: 0 4px 0 #C94A40;
  }

  button.action:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.25);
  }

  button.action:focus-visible {
    outline: 3px solid var(--ocean);
    outline-offset: 3px;
  }

  button.action[disabled] {
    opacity: 0.45;
    cursor: default;
  }

  /* ---------- Board ---------- */
  .board-wrap {
    width: 100%;
    max-width: 460px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    background: var(--ocean);
    padding: 8px;
    border-radius: 16px;
    box-shadow: 0 5px 0 var(--ocean-deep);
  }

  .cell {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--white);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px;
    font-weight: 700;
    font-size: clamp(0.52rem, 2.5vw, 0.78rem);
    line-height: 1.15;
    color: var(--ink);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    border: none;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    transition: background 0.15s;
  }

  .cell:focus-visible {
    outline: 3px solid var(--coral);
    outline-offset: 1px;
  }

  .cell.free {
    padding: 0;
    background: var(--coral);
    cursor: default;
  }

  .cell.free img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    border: 3px solid var(--coral);
  }

  .cell.free .ribbon {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    background: var(--coral);
    color: var(--white);
    font-family: 'Lilita One', cursive;
    font-weight: 400;
    font-size: clamp(0.55rem, 2.4vw, 0.8rem);
    letter-spacing: 0.12em;
    padding: 2px 0 3px;
    text-align: center;
  }

  /* stamped mark */
  .cell.marked { background: #E4F5F0; }

  .cell .stamp {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transform: scale(2.2) rotate(-18deg);
  }

  .cell.marked .stamp {
    opacity: 1;
    transform: scale(1) rotate(-12deg);
    transition: transform 0.18s cubic-bezier(0.2, 1.6, 0.4, 1), opacity 0.12s;
  }

  .stamp svg { width: 72%; height: 72%; }

  .cell.marked .label { opacity: 0.35; }

  /* ---------- Empty state ---------- */
  .empty {
    text-align: center;
    padding: 44px 20px;
    background: var(--sand-deep);
    border-radius: 16px;
    font-weight: 700;
    color: var(--ocean-deep);
  }
  .empty .wave { font-size: 2rem; display: block; margin-bottom: 8px; }

  /* ---------- Bingo banner ---------- */
  .bingo-banner {
    position: fixed;
    left: 50%;
    top: 38%;
    transform: translate(-50%, -50%) scale(0.6) rotate(-6deg);
    background: var(--coral);
    color: var(--white);
    font-family: 'Lilita One', cursive;
    font-size: clamp(1.9rem, 10vw, 3.4rem);
    white-space: nowrap;
    padding: 14px 38px;
    border-radius: 18px;
    box-shadow: 0 8px 0 #C94A40, 0 16px 40px rgba(10, 61, 94, 0.35);
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    letter-spacing: 0.05em;
    text-shadow: 3px 3px 0 #C94A40;
  }

  .bingo-banner.show {
    animation: bingoPop 2.2s ease forwards;
  }

  @keyframes bingoPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-10deg); }
    12%  { opacity: 1; transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
    20%  { transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -55%) scale(1) rotate(-2deg); }
  }

  /* ---------- Square guide sheet ---------- */
  .guide-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 61, 94, 0.55);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 100;
  }

  .guide-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .guide-sheet {
    width: 100%;
    max-width: 460px;
    max-height: 78vh;
    background: var(--white);
    border-radius: 20px 20px 0 0;
    display: flex;
    flex-direction: column;
    transform: translateY(24px);
    transition: transform 0.25s cubic-bezier(0.2, 1, 0.3, 1);
    box-shadow: 0 -6px 30px rgba(10, 61, 94, 0.3);
  }

  .guide-overlay.open .guide-sheet { transform: translateY(0); }

  .guide-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 10px;
    border-bottom: 3px solid var(--sand-deep);
  }

  .guide-header h2 {
    margin: 0;
    font-family: 'Lilita One', cursive;
    font-weight: 400;
    font-size: 1.3rem;
    color: var(--ocean);
    letter-spacing: 0.03em;
  }

  .guide-close {
    border: none;
    background: var(--sand-deep);
    color: var(--ocean-deep);
    font-size: 1rem;
    font-weight: 800;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
  }

  .guide-list {
    list-style: none;
    margin: 0;
    padding: 8px 20px calc(20px + env(safe-area-inset-bottom));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .guide-list li {
    padding: 12px 0;
    border-bottom: 1px solid var(--sand-deep);
    font-size: 0.9rem;
    line-height: 1.4;
  }

  .guide-list li:last-child { border-bottom: none; }

  .guide-list strong {
    display: block;
    color: var(--coral);
    font-weight: 800;
    margin-bottom: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .cell.marked .stamp { transition: none; }
    .bingo-banner.show { animation: none; opacity: 1; }
    button.action { transition: none; }
    .guide-sheet { transition: none; }
    .guide-overlay { transition: none; }
  }
</style>
</head>
<body>

<header class="awning">
  <h1>Ocean Bingo<br>Xtravaganza</h1>
  <p class="sub">Beach Bingo</p>
</header>

<div class="controls">
  <button class="action" id="generateBtn">Generate board</button>
  <button class="action coral" id="descBtn" disabled>Square guide</button>
</div>

<div class="board-wrap" id="boardWrap">
  <div class="empty" id="emptyState">
    <span class="wave">🌊</span>
    Tap “Generate board” to deal your first card.
  </div>
</div>

<div class="bingo-banner" id="bingoBanner">BINGO!</div>

<div class="guide-overlay" id="guideOverlay" role="dialog" aria-modal="true" aria-label="Square guide">
  <div class="guide-sheet">
    <div class="guide-header">
      <h2>Square guide</h2>
      <button id="guideClose" class="guide-close" aria-label="Close guide">✕</button>
    </div>
    <ul class="guide-list" id="guideList"></ul>
  </div>
</div>

const boardWrap = document.getElementById("boardWrap");
const emptyState = document.getElementById("emptyState");
const generateBtn = document.getElementById("generateBtn");
const descBtn = document.getElementById("descBtn");
const bingoBanner = document.getElementById("bingoBanner");
const guideOverlay = document.getElementById("guideOverlay");
const guideList = document.getElementById("guideList");
const guideClose = document.getElementById("guideClose");

let marked = new Set();
let celebratedLines = new Set();
let currentPicks = [];

const STAMP_SVG = `
  <svg viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="44" fill="none" stroke="#FF6B5E" stroke-width="6" stroke-dasharray="10 6"/>
    <path d="M50 22 L57 42 L78 42 L61 55 L67 76 L50 63 L33 76 L39 55 L22 42 L43 42 Z"
          fill="#FF6B5E" opacity="0.9"/>
  </svg>`;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const SAVE_KEY = "oceanBingoState";

function saveState() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      picks: currentPicks,
      marked: [...marked],
      celebrated: [...celebratedLines]
    }));
  } catch (e) { /* storage unavailable (e.g. preview) — play continues, just won't persist */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!Array.isArray(s.picks) || s.picks.length !== 24) return null;
    return s;
  } catch (e) {
    return null;
  }
}

function generateBoard() {
  const picks = shuffle(PROMPTS).slice(0, 24);
  currentPicks = picks;
  marked = new Set([FREE_INDEX]);
  celebratedLines = new Set();
  renderBoard();
  saveState();
}

function renderBoard() {
  const picks = currentPicks;

  const board = document.createElement("div");
  board.className = "board";
  board.setAttribute("role", "grid");
  board.setAttribute("aria-label", "Bingo board, 5 by 5");

  let p = 0;
  for (let i = 0; i < 25; i++) {
    const cell = document.createElement("button");
    cell.className = "cell";
    cell.dataset.index = i;
    cell.setAttribute("type", "button");

    if (i === FREE_INDEX) {
      cell.classList.add("free");
      cell.innerHTML = `<img src="${FREE_PHOTO}" alt="Free space photo"><span class="ribbon">FREE</span>`;
      cell.setAttribute("aria-label", "Free space");
      cell.disabled = true;
    } else {
      const label = document.createElement("span");
      label.className = "label";
      label.textContent = picks[p++].text;
      cell.appendChild(label);

      const stamp = document.createElement("span");
      stamp.className = "stamp";
      stamp.innerHTML = STAMP_SVG;
      cell.appendChild(stamp);

      if (marked.has(i)) {
        cell.classList.add("marked");
        cell.setAttribute("aria-pressed", "true");
      } else {
        cell.setAttribute("aria-pressed", "false");
      }
      cell.addEventListener("click", () => toggleCell(cell, i));
    }
    board.appendChild(cell);
  }

  boardWrap.innerHTML = "";
  boardWrap.appendChild(board);

  generateBtn.textContent = "Regenerate board";
  descBtn.disabled = false;
}

function toggleCell(cell, index) {
  if (marked.has(index)) {
    marked.delete(index);
    cell.classList.remove("marked");
    cell.setAttribute("aria-pressed", "false");
  } else {
    marked.add(index);
    cell.classList.add("marked");
    cell.setAttribute("aria-pressed", "true");
    checkBingo();
  }
  saveState();
}

function lines() {
  const out = [];
  for (let r = 0; r < 5; r++) out.push([0,1,2,3,4].map(c => r * 5 + c)); // rows
  for (let c = 0; c < 5; c++) out.push([0,1,2,3,4].map(r => r * 5 + c)); // cols
  out.push([0, 6, 12, 18, 24]); // diagonal
  out.push([4, 8, 12, 16, 20]); // anti-diagonal
  return out;
}

function checkBingo() {
  // Blackout: every square marked (free space counts automatically)
  if (marked.size === 25 && !celebratedLines.has("blackout")) {
    celebratedLines.add("blackout");
    showBingo("BLACKOUT!");
    return;
  }
  for (const line of lines()) {
    const key = line.join("-");
    if (celebratedLines.has(key)) continue;
    if (line.every(i => marked.has(i))) {
      celebratedLines.add(key);
      showBingo("BINGO!");
      break;
    }
  }
}

function showBingo(text) {
  bingoBanner.textContent = text;
  bingoBanner.classList.remove("show");
  // force reflow so the animation can replay
  void bingoBanner.offsetWidth;
  bingoBanner.classList.add("show");
  if (navigator.vibrate) {
    navigator.vibrate(text === "BLACKOUT!" ? [80, 40, 80, 40, 160] : [60, 40, 60]);
  }
}

function openGuide() {
  guideList.innerHTML = "";
  const items = [...currentPicks].sort((a, b) => a.text.localeCompare(b.text));
  for (const item of items) {
    const li = document.createElement("li");
    const name = document.createElement("strong");
    name.textContent = item.text;
    const desc = document.createElement("span");
    desc.textContent = item.desc;
    li.appendChild(name);
    li.appendChild(desc);
    guideList.appendChild(li);
  }
  guideOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeGuide() {
  guideOverlay.classList.remove("open");
  document.body.style.overflow = "";
}

generateBtn.addEventListener("click", generateBoard);
descBtn.addEventListener("click", openGuide);

// Restore a saved board on launch
const saved = loadState();
if (saved) {
  currentPicks = saved.picks;
  marked = new Set(saved.marked);
  celebratedLines = new Set(saved.celebrated);
  renderBoard();
}
guideClose.addEventListener("click", closeGuide);
guideOverlay.addEventListener("click", (e) => {
  if (e.target === guideOverlay) closeGuide();
});
</script>
